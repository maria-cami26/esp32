    .btn { 
      padding: 20px; 
      font-size: 20px; 
      margin: 10px; 
      border: none; 
      border-radius: 10px; 
      color: white; 
      cursor: pointer; 
      width: 200px; 
    } 
 
    .on { 
      background-color: rgb(228, 228, 29); 
    } 

    .on:hover{
        background-color:green;
        border-radius: 30%;
        transition: 4s;
    }
 
    .off { 
      background-color: rgb(219, 11, 11); 
    } 

    .off:hover{
      background-color: black; 
      border-radius: 30%;
      transition: 4s;
    }

  </style>
